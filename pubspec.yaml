name: questboard
description: "QuestBoard, a gamified RPG productivity system built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  connectivity_plus: ^7.1.1
  dio: ^5.4.3
  fl_chart: ^1.2.0
  flutter_animate: ^4.5.0
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^2.4.1
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  lottie: ^3.1.2
  package_info_plus: ^8.0.0
  retrofit: ^4.1.0
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  google_sign_in: ^7.2.0

dev_dependencies:
  build_runner: ^2.4.9
  freezed: ^2.5.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - .env
