name: questboard
description: "QuestBoard, a gamified RPG productivity system built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  dio: ^5.4.3
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.1
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  lottie: ^3.1.2
  retrofit: ^4.1.0
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.9
  freezed: ^2.5.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - .env
